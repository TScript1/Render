<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/style.css">
    <title>Rusteez | Login</title>
</head>
<body>
    <nav class="navbar">
        <a href="/" class="nav-logo">RUSTEEZ</a>
        <div class="nav-links"><a href="/signup">Sign Up</a></div>
    </nav>

    <div class="page-container">
        <div class="auth-card">
            <h1>Welcome Back</h1>
            <p style="color:var(--text-muted)">Access the trade machine panel</p>
            <form action="/api/auth/login" method="POST">
                <input type="email" name="email" placeholder="Email Address" required>
                <input type="password" name="password" placeholder="Password" required>
                <button type="submit">SIGN IN</button>
            </form>
            <p style="margin-top:20px;"><a href="/signup" style="color:var(--accent); text-decoration:none;">Don't have an account? Sign up</a></p>
        </div>
    </div>
</body>
</html>
