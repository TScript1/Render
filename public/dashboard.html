<body style="display:block; margin:0;">
    <div class="dashboard-container">
        <div class="sidebar">
            <h2 style="color:var(--accent); text-align:center;">RUSTEEZ</h2>
            <hr style="width:100%; border:0.5px solid #40444b; margin: 20px 0;">
            
            <button class="tab-btn active" onclick="openTab(event, 'trade-hits')">💎 Trade Hits</button>
            <button class="tab-btn" onclick="openTab(event, 'messages')">💬 Messages</button>
            <button class="tab-btn" onclick="openTab(event, 'create-script')">📜 Create Script</button>
            
            <div style="margin-top:auto;">
                <p id="user-display" style="font-size:0.8em; color:gray;">User: ...</p>
                <button onclick="logout()" style="background:#ff4747; padding:8px;">Logout</button>
            </div>
        </div>

        <div class="main-content">
            
            <div id="trade-hits" class="tab-content active">
                <h1>Trade Hits Feed</h1>
                <div id="hits-container" class="hits-list">
                    </div>
            </div>

            <div id="messages" class="tab-content">
                <h1>User & Admin Messages</h1>
                <div class="chat-system">
                    <div id="message-list"></div>
                    <div class="message-input">
                        <input type="text" id="msg-target" placeholder="User ID or 'Admin'">
                        <input type="text" id="msg-content" placeholder="Type a message...">
                        <button onclick="sendMessage()">Send</button>
                    </div>
                </div>
            </div>

            <div id="create-script" class="tab-content">
                <h1>Script Generator</h1>
                <p style="color:gray;">Coming soon... This area will be for your custom Lua scripts.</p>
            </div>

        </div>
    </div>

</body>
</html>
