<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/style.css">
    <title>Rusteez | Sign Up</title>
</head>
<body>
    <nav class="navbar">
        <a href="/" class="nav-logo">RUSTEEZ</a>
        <div class="nav-links"><a href="/login">Login</a></div>
    </nav>

    <div class="page-container">
        <div class="auth-card">
            <h1>Join Rusteez</h1>
            <p style="color:var(--text-muted)">Start capturing trade machine logs today</p>
            <form action="/api/auth/signup" method="POST">
                <input type="text" name="username" placeholder="Username" required>
                <input type="email" name="email" placeholder="Email Address" required>
                <input type="password" name="password" placeholder="Password" required>
                <button type="submit">CREATE ACCOUNT</button>
            </form>
            <p style="margin-top:20px;"><a href="/login" style="color:var(--accent); text-decoration:none;">Already registered? Login here</a></p>
        </div>
    </div>
</body>
</html>
